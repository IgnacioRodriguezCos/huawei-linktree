<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huawei - Links</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="avatar">
                <img src="logo.png" alt="Huawei Logo">
            </div>
            <h1 class="title">Huawei</h1>
            <p class="subtitle">Conectando el futuro</p>
        </header>

        <main class="links">
            <a href="https://cotizador-stdg.onrender.com/" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">💻</span>
                <span class="link-text">Cotizador Windows</span>
                <span class="link-arrow">→</span>
            </a>

            <a href="http://huaweilatam.com/#/estimator?mode=cloud_billing" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">📄</span>
                <span class="link-text">Cotizador por Factura</span>
                <span class="link-arrow">→</span>
            </a>

            <a href="https://huaweicloudtrainer.vercel.app/" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">🎓</span>
                <span class="link-text">HCIA Training</span>
                <span class="link-arrow">→</span>
            </a>

            <a href="https://huawei-image-sharer.vercel.app/pending" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">🖼️</span>
                <span class="link-text">Administrador de Imagenes</span>
                <span class="link-arrow">→</span>
            </a>
        </main>

        <footer class="footer">
            <p>© 2026 Huawei Technologies Co., Ltd.</p>
        </footer>
    </div>
</body>
</html>
